name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.4

      - name: Install dependencies
        run: flutter pub get

      - name: Codegen (freezed / json_serializable / injectable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Design-token gate
        run: bash scripts/check_design_tokens.sh

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        # base-href must match the repo name for a project page:
        # https://<user>.github.io/<repo>/
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: SPA fallback (deep links / refresh don't 404)
        run: cp build/web/index.html build/web/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
