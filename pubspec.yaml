name: clever_portfolio
description: "Ahmed Maher — Flutter Team Lead. Personal portfolio (Flutter Web)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management (BLoC/Cubit) — all cubits extend core/abstract/BaseCubit<T>.
  flutter_bloc: ^9.1.1
  bloc: ^9.0.1

  # Functional error handling — Either<Failure, T> across every repo + use case.
  dartz: ^0.10.1

  # HTTP client — wired in DioClient, reserved for the contact form + future remote content.
  dio: ^5.9.0

  # Responsive sizing (the mandated "sizeHelper") — .w / .h / .sp / .r behind core/responsive/.
  flutter_screenutil: ^5.9.3

  # Dependency injection.
  get_it: ^8.2.0
  injectable: ^2.5.1

  # Routing — single '/' route + smooth-scroll anchors; clean web URLs.
  go_router: ^16.2.4

  # Typography — Space Grotesk / Inter / JetBrains Mono (+ Arabic face) via google_fonts.
  google_fonts: ^6.3.2

  # Localization — en.json + ar.json, RTL first-class.
  easy_localization: ^3.0.8

  # Open store / mailto / tel / CV links.
  url_launcher: ^6.3.2

  # Vector assets (store badges, icons).
  flutter_svg: ^2.2.0

  # Brand / store / social glyphs.
  font_awesome_flutter: ^10.10.0

  # Motion — entrance/scroll animations (reduced-motion gated).
  flutter_animate: ^4.5.2
  visibility_detector: ^0.4.0+2

  # Local persistence — ThemeMode + Locale.
  shared_preferences: ^2.5.3

  # Codegen annotations — Freezed unions (states/models) + JSON serialization.
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Value equality for pure domain entities + Failures.
  equatable: ^2.0.7

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints (house standard).
  flutter_lints: ^6.0.0

  # Code generation — freezed + json_serializable + injectable, all via build_runner.
  build_runner: ^2.15.0
  freezed: ^3.1.0
  json_serializable: ^6.9.0
  injectable_generator: ^2.6.2

  # Testing.
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/docs/
    - assets/translations/
    # Enabled in later milestones (files authored in M1 / M3):
    # - assets/data/apps.json
    # - assets/data/profile.json
    # - assets/icons/
    # - assets/images/
    # - assets/images/projects/
